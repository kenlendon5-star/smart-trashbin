<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trashbin Monitor</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="app-header">
    <div class="header-inner">
      <h1>Trashbin Monitor</h1>
      <button type="button" class="theme-btn" id="themeToggle" aria-label="Toggle theme">
        <span class="theme-icon" aria-hidden="true">☾</span>
        <span class="theme-text">Dark</span>
      </button>
    </div>
  </header>

  <script>
    (function () {
      const toggleBtn = document.getElementById('themeToggle');
      if (!toggleBtn) return;

      const icon = toggleBtn.querySelector('.theme-icon');
      const text = toggleBtn.querySelector('.theme-text');

      const getStored = () => {
        try { return localStorage.getItem('theme'); } catch { return null; }
      };

      const setStored = (t) => {
        try { localStorage.setItem('theme', t); } catch {}
      };

      const applyTheme = (theme) => {
        document.documentElement.setAttribute('data-theme', theme);

        if (theme === 'dark') {
          if (icon) icon.textContent = '☾';
          if (text) text.textContent = 'Dark';
        } else {
          if (icon) icon.textContent = '☀';
          if (text) text.textContent = 'Light';
        }
      };

      const init = () => {
        const stored = getStored();
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = stored || (prefersDark ? 'dark' : 'light');
        applyTheme(theme);
      };

      toggleBtn.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme') || 'light';
        const next = current === 'dark' ? 'light' : 'dark';
        applyTheme(next);
        setStored(next);
      });

      init();
    })();
  </script>

  <main class="container">

    <!-- Connection Status -->
    <div class="card">
      <h2>Status</h2>
      <p id="connectionStatus">Connecting...</p>
    </div>

    <!-- Lid Counter -->
    <div class="card">
      <h2>Lid Open Counter</h2>
      <div class="big-number" id="lidCount">0</div>
    </div>

    <!-- Bin Level -->
    <div class="card">
      <h2>Trash Bin Level</h2>

      <div class="gauge-container">
        <div class="gauge-fill" id="binGauge"></div>
      </div>

      <div class="level-text" id="binLevelText">0%</div>
    </div>

    <!-- Controls -->
    <div class="card">
      <h2>Lid Override</h2>

      <div class="status-box">
        <p>Lid Status</p>
        <h3 id="lidStatus">closed</h3>
      </div>

      <div class="status-box">
        <p>Override Command</p>
        <h3 id="overrideStatus">none</h3>
      </div>

      <button onclick="openLid()">Open Lid</button>
      <button onclick="closeLid()">Close Lid</button>
    </div>

    <!-- Debug structure -->
    <div class="card">
      <h2>Firebase Structure</h2>
      <pre>
{
  "trashbin": {
    "lidOpenCount": 0,
    "binLevel": 0,
    "lidStatus": "closed",
    "override": "none"
  }
}
      </pre>
    </div>

  </main>

  <!-- IMPORTANT: must be module -->
  <script type="module" src="app.js"></script>
</body>
</html>
